# One isolated stack per business (Path A — instance-per-business).
# Launch with a tenant env file generated by provision-tenant.ts:
#   docker compose --env-file tenants/acme/.env -f docker-compose.tenant.yml -p crm-acme up -d --build
#
# Each project (-p crm-<slug>) gets its own DB volume, WhatsApp session, and
# secrets — businesses are physically isolated.

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Persist the queue state so scheduled broadcasts / automation flows survive
    # a restart. Required by the backend in production (see lib/env.ts).
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      # Redis queue (broadcasts + automation flows). Service name on the compose network.
      REDIS_URL: redis://redis:6379
      # Store uploaded media on the persistent `uploads` volume instead of external
      # S3. Appropriate for a single self-hosted instance (volume is durable).
      ALLOW_LOCAL_STORAGE: "true"
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${PUBLIC_URL}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-baileys}
      WHATSAPP_SESSION_PATH: /data/wa-session
      WHATSAPP_SESSION_ID: ${TENANT_SLUG}
      # true = skip the 15-day new-number warm-up ramp (use for an already-trusted number)
      WHATSAPP_ESTABLISHED: ${WHATSAPP_ESTABLISHED:-false}
      # true = actually enforce warm-up daily caps (opt-in; off won't throttle existing numbers)
      WARMUP_ENFORCE: ${WARMUP_ENFORCE:-false}
      DEV_SUPERUSER_EMAIL: ${DEV_SUPERUSER_EMAIL:-}
      DEV_SUPERUSER_PASSWORD: ${DEV_SUPERUSER_PASSWORD:-}
      DEV_SUPERUSER_NAME: ${DEV_SUPERUSER_NAME:-Developer}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      OWNER_NAME: ${OWNER_NAME:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
    volumes:
      - wa_session:/data/wa-session
      - uploads:/app/apps/backend/uploads
    ports:
      - "${BACKEND_PORT}:4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
        NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_URL}
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${PUBLIC_URL}
      # Server-side (container→backend) login calls use this internal URL.
      BACKEND_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
      NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  wa_session:
  uploads:
